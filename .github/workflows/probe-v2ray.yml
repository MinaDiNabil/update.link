# GitHub Actions workflow that probes the V2Ray subscription sources
# and commits the verified-working list to the update.link repo so the
# Android client can fetch it instantly.
#
# Two-stage architecture:
#   Stage 1 (probe.py) — fast TCP + TLS + WebSocket Upgrade + protocol
#   handshakes; reduces 5000 raw subscription entries to ~200-500 that
#   look alive on the wire.
#
#   Stage 2 (xray-core) — for every Stage 1 survivor, spawns a real
#   xray-core process with that server as outbound and verifies an
#   actual HTTP request can travel through the tunnel.  Same engine
#   V2RAY NG uses; same accuracy.

name: probe-v2ray-servers

on:
  schedule:
    # Every 30 minutes.  GitHub Actions cron is in UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write           # required to commit the JSON back to main

concurrency:
  # Skip overlapping runs — a single in-flight probe is enough.
  group: probe-v2ray-servers
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 25     # whole job, including network

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # xray-core gives the prober V2RAY NG-grade accuracy: it actually
      # establishes a tunnel through every Stage 1 survivor and verifies
      # an HTTP request can travel through it.  Without xray installed,
      # probe.py falls back to Stage-1-only output (TCP + TLS + WS
      # Upgrade), which still works but lets through false positives.
      # The tarball is ~10 MB and pinned to a specific release for
      # reproducibility — bump XRAY_VERSION when you want to upgrade.
      - name: Install xray-core
        env:
          XRAY_VERSION: 1.8.24
        run: |
          set -e
          curl -sSL "https://github.com/XTLS/Xray-core/releases/download/v${XRAY_VERSION}/Xray-linux-64.zip" -o /tmp/xray.zip
          mkdir -p /tmp/xray
          unzip -o /tmp/xray.zip -d /tmp/xray >/dev/null
          sudo install -m 0755 /tmp/xray/xray /usr/local/bin/xray
          xray version

      - name: Probe and emit JSON
        run: python probe.py --output v2ray-verified.json --limit 1500

      - name: Commit the updated JSON if changed
        run: |
          set -e
          git config user.name  "v2ray-prober[bot]"
          git config user.email "v2ray-prober@users.noreply.github.com"
          if [ -n "$(git status --porcelain v2ray-verified.json)" ]; then
            git add v2ray-verified.json
            git commit -m "chore(prober): refresh v2ray-verified.json [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
